packages:
  - "native"
injectWorkspacePackages: true
minimumReleaseAge: 720 # 12 hours
minimumReleaseAgeExclude:
  - fast-xml-parser
  - follow-redirects
  # TypeScript 7 resolves its native platform binaries (e.g.
  # @typescript/typescript-darwin-arm64) as transitive optional deps, which
  # the age gate would otherwise silently skip, leaving tsc unable to run.
  - typescript
  - "@typescript/typescript6"
  - "@typescript/typescript-*"
overrides:
  "@types/express": "^5.0.6"
  bigint-buffer: "npm:four-flap-bigint-buffer@1.1.6"
  diff: "^8.0.3"
  ajv: "^8.18.0"
  fast-xml-builder: ">=1.1.6 <2.0.0"
  fast-xml-parser: "^5.7.0"
  fast-uri: ">=3.1.2 <4.0.0"
  "glob@>=10.2.0 <10.5.0": ">=10.5.0"
  "js-yaml@<3.14.2": "4.2.0"
  "js-yaml@>=4.0.0 <4.2.0": "4.2.0"
  "qs@<6.15.2": ">=6.15.2 <7.0.0"
  "minimatch@<10.2.3": ">=10.2.3"
  "bn.js@<5.2.3": ">=5.2.3"
  "@tootallnate/once@<3.0.1": ">=3.0.1"
  yauzl: "^3.2.1"
  undici: "7.28.0"
  "picomatch@<4.0.4": ">=4.0.4"
  "yaml@<2.8.3": ">=2.8.3"
  "smol-toml@<1.6.1": ">=1.6.1"
  handlebars: ">=4.7.9"
  "path-to-regexp@~0.1.12": "0.1.13"
  brace-expansion: ">=5.0.6"
  "ws@>=7.0.0 <7.5.11": "7.5.11"
  "ws@>=8.0.0 <8.21.0": "8.21.0"
  "form-data@>=2.0.0 <2.5.6": "2.5.6"
  "form-data@>=3.0.0 <3.0.5": "3.0.5"
  "form-data@>=4.0.0 <4.0.6": "4.0.6"
  "@babel/core@>=7.0.0 <7.29.6": "7.29.7"
  "follow-redirects@<1.16.0": ">=1.16.0 <2.0.0"
  "uuid@<11.1.1": "11.1.1"
  "js-cookie@<3.0.7": "3.0.7"
  "shell-quote@<1.8.4": "1.8.4"
  "esbuild@>=0.17.0 <0.28.1": "0.28.1"
  "@opentelemetry/core@>=2.0.0 <2.8.0": "2.8.0"
patchedDependencies:
  "node-fetch@2.7.0": "patches/node-fetch@2.7.0.patch"
allowBuilds:
  "@mendable/firecrawl-rs": true
  "@sentry-internal/node-cpu-profiler": true
  "@sentry/cli": true
  bigint-buffer: true
  bufferutil: true
  esbuild: true
  foundationdb: true
  four-flap-bigint-buffer: true
  keccak: true
  koffi: true
  libpq: true
  msgpackr-extract: true
  oxc-resolver: true
  protobufjs: true
  utf-8-validate: true
  wordpos: true
