packages:
  - "native"
injectWorkspacePackages: true
minimumReleaseAge: 720 # 12 hours
minimumReleaseAgeExclude:
  - fast-xml-parser
  - follow-redirects
  # TypeScript 7 resolves its native platform binaries (e.g.
  # @typescript/typescript-darwin-arm64) as transitive optional deps, which
  # the age gate would otherwise silently skip, leaving tsc unable to run.
  - typescript
  - "@typescript/typescript6"
  - "@typescript/typescript-*"
overrides:
  "@types/express": "^5.0.6"
patchedDependencies:
  "node-fetch@2.7.0": "patches/node-fetch@2.7.0.patch"
onlyBuiltDependencies:
  - "@mendable/firecrawl-rs"
  - "@sentry-internal/node-cpu-profiler"
  - "@sentry/cli"
  - bigint-buffer
  - bufferutil
  - esbuild
  - foundationdb
  - four-flap-bigint-buffer
  - keccak
  - koffi
  - libpq
  - msgpackr-extract
  - oxc-resolver
  - protobufjs
  - utf-8-validate
  - wordpos
